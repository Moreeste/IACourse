<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito de Compras</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #21262d;
      --text: #c9d1d9;
      --text-muted: #8b98a6;
      --accent: #58a6ff;
      --accent-soft: rgba(88, 166, 255, 0.16);
      --success: #3fb950;
      --danger: #f85149;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #090b10 0%, #11161f 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: min(1200px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
      gap: 24px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(12px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    header h1 {
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      line-height: 1.05;
    }

    header p {
      color: var(--text-muted);
      max-width: 40ch;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 0.75rem 1rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .products {
      display: grid;
      gap: 18px;
    }

    .product-card {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-3px);
      border-color: rgba(88, 166, 255, 0.3);
    }

    .product-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.2));
    }

    .product-info {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .product-info h2 {
      font-size: 1.05rem;
      margin-bottom: 8px;
    }

    .product-info span {
      display: inline-flex;
      align-items: center;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .product-info p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .product-info button {
      align-self: flex-start;
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 0.95rem 1.2rem;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .search-box {
      margin-bottom: 22px;
    }

    .search-box input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-box input:focus {
      border-color: rgba(88, 166, 255, 0.5);
      box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.14);
    }

    .pagination {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .page-button {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 0.9rem 1rem;
      border-radius: 14px;
      cursor: pointer;
      min-width: 46px;
      font-weight: 600;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .page-button:hover:not(:disabled) {
      background: rgba(88, 166, 255, 0.16);
      border-color: rgba(88, 166, 255, 0.4);
    }

    .page-button.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .page-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .product-info button:hover {
      background: #419fff;
      transform: translateY(-1px);
    }

    .cart-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .cart-title h2 {
      font-size: 1.3rem;
    }

    .cart-summary {
      background: var(--surface-2);
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 22px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-summary div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      font-size: 0.98rem;
    }

    .cart-summary div:last-child {
      margin-bottom: 0;
    }

    .total-label {
      color: var(--text-muted);
    }

    .total-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
    }

    .cart-items {
      display: grid;
      gap: 14px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .cart-item-img {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      overflow: hidden;
    }

    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-item-detail {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .cart-item-detail strong {
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cart-item-detail span {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .cart-item-actions {
      display: grid;
      gap: 8px;
      text-align: right;
      min-width: 100px;
    }

    .cart-item-actions button {
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .empty-state {
      padding: 32px 20px;
      color: var(--text-muted);
      text-align: center;
      border-radius: 22px;
      background: var(--surface-2);
      border: 1px dashed rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 16px;
      }

      .panel {
        padding: 20px;
      }

      .product-card {
        grid-template-columns: 1fr;
      }

      .product-card img {
        min-height: 220px;
      }

      .cart-item {
        grid-template-columns: 1fr;
        text-align: left;
      }

      .cart-item-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>

    <section class="panel">

          <h1>Mercado Moderno</h1>

        </div>

      <div class="search-box">

    <aside class="panel">

      <div class="cart-summary">

        </div>
        <div>
          <span class="total-label">Total</span>
          <strong class="total-value" id="cart-total">$0.00</strong>
        </div>
      </div>

      <div class="cart-items" id="cart-items">
        <div class="empty-state" id="empty-state">Tu carrito está vacío. Agrega un producto para comenzar.</div>
      </div>
    </aside>
  </main>

    const cart = [];

    const productsContainer = document.getElementById('products');
    const paginationContainer = document.getElementById('pagination');
    const searchInput = document.getElementById('search-input');
    const cartItemsContainer = document.getElementById('cart-items');
    const cartTotalElement = document.getElementById('cart-total');
    const cartCountElement = document.getElementById('cart-count');
    const emptyState = document.getElementById('empty-state');

    const itemsPerPage = 10;
    let currentPage = 1;

    function formatCurrency(value) {
      return new Intl.NumberFormat('es-ES', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2
      }).format(value);
    }

    function getFilteredProducts() {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) return products;
      return products.filter(product =>
        product.name.toLowerCase().includes(query) ||
        product.description.toLowerCase().includes(query)
      );
    }

    function getVisibleProducts() {
      const filtered = getFilteredProducts();
      const startIndex = (currentPage - 1) * itemsPerPage;
      return filtered.slice(startIndex, startIndex + itemsPerPage);
    }

    function renderPagination(totalItems) {
      const totalPages = Math.max(1, Math.ceil(totalItems / itemsPerPage));
      if (currentPage > totalPages) currentPage = totalPages;
      if (totalPages === 1) {
        paginationContainer.innerHTML = '';
        return;
      }

      const pages = [];
      for (let i = 1; i <= totalPages; i += 1) {
        pages.push(`
          <button type="button" class="page-button ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>
        `);
      }

      paginationContainer.innerHTML = `
        <button type="button" class="page-button" data-page="prev" ${currentPage === 1 ? 'disabled' : ''}>Anterior</button>
        ${pages.join('')}
        <button type="button" class="page-button" data-page="next" ${currentPage === totalPages ? 'disabled' : ''}>Siguiente</button>
      `;
    }

    function renderProducts() {
      const filteredProducts = getFilteredProducts();
      const visibleProducts = getVisibleProducts();
      const totalPages = Math.max(1, Math.ceil(filteredProducts.length / itemsPerPage));
      if (currentPage > totalPages) currentPage = totalPages;

      if (filteredProducts.length === 0) {
        productsContainer.innerHTML = '<div class="empty-state">No se encontraron productos para la búsqueda.</div>';
        paginationContainer.innerHTML = '';
        return;
      }

      productsContainer.innerHTML = visibleProducts.map(product => `
        <article class="product-card">
          <img src="${product.image}" alt="${product.name}" loading="lazy" />
          <div class="product-info">
            <div>
              <h2>${product.name}</h2>
              <span>${formatCurrency(product.price)}</span>
              <p>${product.description}</p>
            </div>
            <button type="button" data-id="${product.id}">Agregar</button>
          </div>
        </article>
      `).join('');

      renderPagination(filteredProducts.length);
    }

    function renderCart() {
      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '';
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        cartItemsContainer.innerHTML = cart.map(item => `
          <div class="cart-item">
            <div class="cart-item-img">
              <img src="${item.image}" alt="${item.name}" />
            </div>
            <div class="cart-item-detail">
              <strong>${item.name}</strong>
              <span>${item.quantity} × ${formatCurrency(item.price)}</span>
            </div>
            <div class="cart-item-actions">
              <button type="button" data-action="remove" data-id="${item.id}">Quitar</button>
            </div>
          </div>
        `).join('');
      }

      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);

      cartTotalElement.textContent = formatCurrency(total);
      cartCountElement.textContent = count;
    }

    function addToCart(productId) {
      const product = products.find(item => item.id === productId);
      if (!product) return;

      const cartItem = cart.find(item => item.id === productId);
      if (cartItem) {
        cartItem.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      renderCart();
    }

    function removeFromCart(productId) {
      const index = cart.findIndex(item => item.id === productId);
      if (index === -1) return;

      cart[index].quantity -= 1;
      if (cart[index].quantity === 0) {
        cart.splice(index, 1);
      }
      renderCart();
    }

    productsContainer.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-id]');
      if (!button) return;
      const productId = Number(button.dataset.id);
      addToCart(productId);
    });

    paginationContainer.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-page]');
      if (!button) return;
      const page = button.dataset.page;
      const filteredProducts = getFilteredProducts();
      const totalPages = Math.max(1, Math.ceil(filteredProducts.length / itemsPerPage));

      if (page === 'prev' && currentPage > 1) {
        currentPage -= 1;
      } else if (page === 'next' && currentPage < totalPages) {
        currentPage += 1;
      } else if (!isNaN(page)) {
        currentPage = Number(page);
      }

      renderProducts();
    });

    searchInput.addEventListener('input', () => {
      currentPage = 1;
      renderProducts();
    });

    cartItemsContainer.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action="remove"]');
      if (!button) return;
      const productId = Number(button.dataset.id);
      removeFromCart(productId);
    });

    renderProducts();
    renderCart();
  </script>
</body>
</html>
